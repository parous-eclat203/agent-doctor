name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-cli:
    name: Rust CLI (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy (core + CLI only)
        run: cargo clippy -p agent-doctor-core -p agent-doctor --all-targets -- -D warnings

      - name: Test (core + CLI only)
        run: cargo test -p agent-doctor-core -p agent-doctor

      - name: Build CLI
        run: cargo build --release -p agent-doctor

  rust-desktop:
    name: Rust desktop (Tauri)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Clippy desktop crate
        run: cargo clippy -p agent-doctor-desktop --all-targets -- -D warnings

  desktop-frontend:
    name: Desktop frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - run: npm ci
      - run: npm run build
